<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gastgeber-Assistent — Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600&display=swap');
  :root{
    --paper:#FAF7F2; --panel:#FFFFFF; --ink:#2B2A28; --ink-soft:#6B6862;
    --forest:#2F4F42; --forest-dark:#1E3A30; --sand:#EFE3CE; --sand-dark:#C9AE7E;
    --line:#E4DED2;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;padding:32px 16px;}
  .wrap{max-width:760px;margin:0 auto;}
  h1{font-family:'Fraunces',serif;font-weight:700;font-size:26px;margin:0 0 6px;}
  .sub{color:var(--ink-soft);font-size:14px;margin:0 0 28px;}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px;margin-bottom:18px;}
  .card h2{font-family:'Fraunces',serif;font-size:17px;margin:0 0 4px;}
  .card .hint{font-size:13px;color:var(--ink-soft);margin:0 0 14px;}

  label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin:12px 0 4px;}
  input[type=text], input[type=email], textarea{
    width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 12px;
    font-family:'Inter',sans-serif;font-size:14px;color:var(--ink);background:#FDFCFA;
  }
  textarea{min-height:160px;resize:vertical;line-height:1.6;}
  input:focus, textarea:focus{outline:2px solid var(--forest);outline-offset:1px;}

  .btn{border:none;background:var(--forest);color:#fff;padding:10px 18px;border-radius:8px;font-size:13.5px;font-weight:600;cursor:pointer;margin-top:12px;}
  .btn:hover{background:var(--forest-dark);}
  .btn.secondary{background:none;border:1px solid var(--line);color:var(--ink);}
  .btn.secondary:hover{background:#F2F2F0;}
  .btn:disabled{opacity:.5;cursor:default;}

  .msg{font-size:13px;margin-top:10px;padding:8px 12px;border-radius:8px;}
  .msg.ok{background:#EAF3EE;color:var(--forest-dark);}
  .msg.err{background:#FBE9E7;color:#8A3B2F;}

  .property{border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:14px;}
  .property .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .property .top .name{font-weight:600;font-size:15px;}
  .link-box{display:flex;gap:8px;align-items:center;background:var(--sand);border-radius:8px;padding:8px 12px;margin-top:10px;font-size:12.5px;word-break:break-all;}
  .link-box button{flex-shrink:0;border:none;background:var(--forest);color:#fff;padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;}

  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
  .topbar .email{font-size:13px;color:var(--ink-soft);}
  .logout{background:none;border:none;color:var(--ink-soft);font-size:13px;cursor:pointer;text-decoration:underline;}

  .lang-switch{position:fixed;top:16px;right:16px;display:flex;gap:0;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--panel);}
  .lang-switch button{border:none;background:none;padding:6px 12px;font-size:12.5px;cursor:pointer;color:var(--ink-soft);}
  .lang-switch button.active{background:var(--forest);color:#fff;font-weight:600;}
</style>
</head>
<body>
<div class="lang-switch">
  <button id="langDe" onclick="setLang('de')">DE</button>
  <button id="langEn" onclick="setLang('en')">EN</button>
</div>
<div class="wrap" id="app">Lädt…</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ── Konfiguration ──
const SUPABASE_URL = "https://lgvbejwvgkppbxoubuoh.supabase.co";
const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_YwaBftrJDkVKem7RrOUEVw_SHwONvDC";
const WIDGET_BASE_URL = "https://gastgeber-assistent.vercel.app/chat-widget.html";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
  auth: { flowType: 'implicit', detectSessionInUrl: true, persistSession: true }
});

let currentUser = null;
let properties = [];
let lang = (navigator.language || 'de').toLowerCase().startsWith('de') ? 'de' : 'en';

// ── Übersetzungen ──
const T = {
  de: {
    title: "Gastgeber-Assistent",
    loginSub: "Melde dich an, um deine Unterkünfte zu verwalten.",
    loginHeading: "Anmelden",
    loginHint: "Du bekommst einen Login-Link per E-Mail zugeschickt — kein Passwort nötig.",
    emailLabel: "E-Mail-Adresse",
    sendLink: "Login-Link senden",
    linkSent: "Login-Link verschickt! Schau in dein E-Mail-Postfach (auch Spam-Ordner prüfen) und klick auf den Link.",
    error: "Fehler",
    yourProperties: "Deine Unterkünfte",
    propertiesCount: (n) => `${n} Unterkunft(en) angelegt`,
    logout: "Abmelden",
    addNew: "Neue Unterkunft hinzufügen",
    fillHint: "Beantworte die Fragen unten einfach direkt hinter dem Doppelpunkt — Zeilen, die nicht zutreffen, kannst du löschen.",
    nameLabel: "Name der Unterkunft",
    namePlaceholder: 'z. B. "Loft am Augustinerplatz"',
    kbLabel: "Wissensbasis (Check-in, WLAN, Regeln, Umgebung…)",
    kbTemplate: `Vollständige Adresse:

Wohnungstyp und Größe (Zimmer, Betten, maximale Gästezahl):

Stockwerk / Aufzug vorhanden?:

Check-in ab wie viel Uhr, und wie kommt der Gast rein? (Schlüsselbox, persönliche Übergabe, Smart Lock...):

Ist ein früherer Check-in gegen Aufpreis möglich?:

Check-out bis wie viel Uhr, und was muss der Gast noch erledigen?:

Ist ein späterer Check-out möglich?:

WLAN-Name und Passwort:

Bedienung von Heizung / Klimaanlage:

Fernseher / Streaming-Zugänge (z.B. Netflix-Login):

Waschmaschine / Geschirrspüler (Bedienung, wo sind Reinigungsmittel?):

Gibt es einen Parkplatz? Falls nein, wo in der Nähe kann man parken?:

Sind Haustiere erlaubt?:

Gibt es Ruhezeiten oder andere wichtige Hausregeln?:

Mülltrennung / Entsorgung (wo stehen die Tonnen?):

Wo ist der nächste Supermarkt / die nächste Bäckerei?:

Gibt es Restaurant- oder Freizeit-Tipps in der Umgebung?:

Wie ist die nächste Bus-/Bahn-Haltestelle zu erreichen?:

Anfahrt vom Bahnhof / Flughafen:

Was sollen Gäste tun, wenn etwas nicht funktioniert oder sie eine dringende Frage haben?:

Kontakt für Handwerker-Notfälle (Heizung, Wasserschaden), falls Vermieter nicht erreichbar:

Ortstaxe / Kurtaxe (Höhe, wie zu zahlen):

Sonstige wichtige Hinweise:`,
    save: "Unterkunft speichern",
    nameRequired: "Bitte einen Namen eintragen.",
    noProperties: "Noch keine Unterkunft angelegt — füg unten deine erste hinzu.",
    editKb: "Wissensbasis bearbeiten",
    saveChanges: "Änderungen speichern",
    saved: "Gespeichert ✓",
    copy: "Kopieren",
    copied: "Kopiert ✓",
  },
  en: {
    title: "Host Assistant",
    loginSub: "Sign in to manage your properties.",
    loginHeading: "Sign in",
    loginHint: "You'll get a login link by email — no password needed.",
    emailLabel: "Email address",
    sendLink: "Send login link",
    linkSent: "Login link sent! Check your inbox (and spam folder) and click the link.",
    error: "Error",
    yourProperties: "Your properties",
    propertiesCount: (n) => `${n} propert${n === 1 ? 'y' : 'ies'} added`,
    logout: "Sign out",
    addNew: "Add a new property",
    fillHint: "Just answer the questions below right after the colon — delete any lines that don't apply.",
    nameLabel: "Property name",
    namePlaceholder: 'e.g. "Loft near the old town"',
    kbLabel: "Knowledge base (check-in, WiFi, rules, area…)",
    kbTemplate: `Full address:

Property type and size (rooms, beds, max guests):

Floor / is there an elevator?:

Check-in from what time, and how does the guest get in? (lockbox, in-person handover, smart lock...):

Is an earlier check-in possible for an extra fee?:

Check-out by what time, and anything the guest needs to do before leaving?:

Is a later check-out possible?:

WiFi name and password:

How to operate the heating / air conditioning:

TV / streaming access (e.g. Netflix login):

Washing machine / dishwasher (how to use, where's the detergent?):

Is there parking? If not, where nearby can guests park?:

Are pets allowed?:

Any quiet hours or other important house rules?:

Waste separation / bins (where are they?):

Where's the nearest supermarket / bakery?:

Any restaurant or things-to-do recommendations nearby?:

How to reach the nearest bus/train stop?:

How to get there from the train station / airport:

What should guests do if something's not working or they have an urgent question?:

Contact for emergency repairs (heating, water damage) if the host is unreachable:

Local tourist tax (amount, how to pay):

Any other important notes:`,
    save: "Save property",
    nameRequired: "Please enter a name.",
    noProperties: "No property yet — add your first one below.",
    editKb: "Edit knowledge base",
    saveChanges: "Save changes",
    saved: "Saved ✓",
    copy: "Copy",
    copied: "Copied ✓",
  }
};
function t(){ return T[lang]; }

function setLang(newLang){
  lang = newLang;
  document.getElementById('langDe').classList.toggle('active', lang === 'de');
  document.getElementById('langEn').classList.toggle('active', lang === 'en');
  if (currentUser) { renderDashboard(); } else { renderLogin(); }
}

async function init(){
  document.getElementById('langDe').classList.toggle('active', lang === 'de');
  document.getElementById('langEn').classList.toggle('active', lang === 'en');

  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    currentUser = session.user;
    await loadProperties();
    renderDashboard();
  } else {
    renderLogin();
  }

  sb.auth.onAuthStateChange(async (event, newSession) => {
    if (event === 'SIGNED_IN' && newSession) {
      currentUser = newSession.user;
      await loadProperties();
      renderDashboard();
    }
    if (event === 'SIGNED_OUT') {
      renderLogin();
    }
  });
}

// ── Login-Ansicht ──
function renderLogin(){
  const s = t();
  document.getElementById('app').innerHTML = `
    <h1>${s.title}</h1>
    <p class="sub">${s.loginSub}</p>
    <div class="card">
      <h2>${s.loginHeading}</h2>
      <p class="hint">${s.loginHint}</p>
      <label>${s.emailLabel}</label>
      <input type="email" id="loginEmail" placeholder="you@example.com">
      <br><button class="btn" onclick="sendMagicLink()">${s.sendLink}</button>
      <div id="loginMsg"></div>
    </div>
  `;
}

async function sendMagicLink(){
  const s = t();
  const email = document.getElementById('loginEmail').value.trim();
  const msgBox = document.getElementById('loginMsg');
  if (!email) return;

  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.href }
  });

  if (error) {
    console.error('Login error (details):', error);
    const details = error.message || error.error_description || error.msg || JSON.stringify(error);
    msgBox.innerHTML = `<div class="msg err">${s.error}: ${details} (Status: ${error.status || 'unknown'})</div>`;
  } else {
    msgBox.innerHTML = `<div class="msg ok">${s.linkSent}</div>`;
  }
}

// ── Dashboard-Ansicht ──
async function loadProperties(){
  const { data, error } = await sb.from('properties').select('*').order('created_at', { ascending: false });
  properties = data || [];
}

function renderDashboard(){
  const s = t();
  document.getElementById('app').innerHTML = `
    <div class="topbar">
      <div>
        <h1>${s.yourProperties}</h1>
        <p class="sub" style="margin:0;">${s.propertiesCount(properties.length)}</p>
      </div>
      <div>
        <div class="email">${currentUser.email}</div>
        <button class="logout" onclick="logout()">${s.logout}</button>
      </div>
    </div>

    <div id="propertyList"></div>

    <div class="card">
      <h2>${s.addNew}</h2>
      <p class="hint">${s.fillHint}</p>
      <label>${s.nameLabel}</label>
      <input type="text" id="newName" placeholder='${s.namePlaceholder}'>
      <label>${s.kbLabel}</label>
      <textarea id="newKb">${s.kbTemplate}</textarea>
      <button class="btn" onclick="addProperty()">${s.save}</button>
      <div id="addMsg"></div>
    </div>
  `;
  renderPropertyList();
}

function renderPropertyList(){
  const s = t();
  const box = document.getElementById('propertyList');
  if (properties.length === 0) {
    box.innerHTML = `<div class="card"><p class="hint" style="margin:0;">${s.noProperties}</p></div>`;
    return;
  }
  box.innerHTML = properties.map(p => {
    const link = `${WIDGET_BASE_URL}?u=${p.id}`;
    return `
      <div class="property">
        <div class="top">
          <div class="name">${escapeHtml(p.name)}</div>
        </div>
        <label>${s.editKb}</label>
        <textarea id="kb-${p.id}">${escapeHtml(p.knowledge_base || '')}</textarea>
        <button class="btn secondary" onclick="updateProperty('${p.id}')">${s.saveChanges}</button>
        <div id="editMsg-${p.id}"></div>
        <div class="link-box">
          <span>${link}</span>
          <button onclick="copyLink('${link}', this)">${s.copy}</button>
        </div>
      </div>
    `;
  }).join('');
}

async function addProperty(){
  const s = t();
  const name = document.getElementById('newName').value.trim();
  const kb = document.getElementById('newKb').value.trim();
  const msgBox = document.getElementById('addMsg');
  if (!name) { msgBox.innerHTML = `<div class="msg err">${s.nameRequired}</div>`; return; }

  const { error } = await sb.from('properties').insert({
    name, knowledge_base: kb, owner_id: currentUser.id
  });

  if (error) {
    msgBox.innerHTML = `<div class="msg err">${s.error}: ${error.message}</div>`;
  } else {
    await loadProperties();
    renderDashboard();
  }
}

async function updateProperty(id){
  const s = t();
  const kb = document.getElementById(`kb-${id}`).value;
  const msgBox = document.getElementById(`editMsg-${id}`);
  const { error } = await sb.from('properties').update({ knowledge_base: kb }).eq('id', id);
  if (error) {
    msgBox.innerHTML = `<div class="msg err">${s.error}: ${error.message}</div>`;
  } else {
    msgBox.innerHTML = `<div class="msg ok">${s.saved}</div>`;
    setTimeout(() => { msgBox.innerHTML = ''; }, 2000);
  }
}

function copyLink(link, btn){
  const s = t();
  navigator.clipboard.writeText(link);
  const original = btn.textContent;
  btn.textContent = s.copied;
  setTimeout(() => { btn.textContent = original; }, 1500);
}

async function logout(){
  await sb.auth.signOut();
  renderLogin();
}

function escapeHtml(str){
  const d = document.createElement('div'); d.textContent = str; return d.innerHTML;
}

init();
</script>
</body>
</html>
